kind: Deployment
apiVersion: apps/v1
metadata:
  name: my-python-wrapper-whispercpp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: transcription-python-app
  template:
    metadata:
      labels:
        app: transcription-python-app
    spec:
      containers:
        - name: my-python-wrapper-whispercpp
          image: python-image:latest
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          resources:
            requests:
              memory: "2048Mi"
              cpu: "10m"
---
kind: Service
apiVersion: v1
metadata:
  name: my-python-wrapper-whispercpp
spec:
  ports:
    - name: http-8081
      port: 8081
      protocol: TCP
      targetPort: 8081
  selector:
    app: python-app
