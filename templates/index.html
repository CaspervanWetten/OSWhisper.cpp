<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSWhisper.cpp - Transcription</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .container { max-width: 800px; margin-top: 50px; }
        .card { border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container">
        <div class="card p-4 mb-4">
            <h2 class="text-center mb-4">OSWhisper.cpp</h2>
            <div id="status"></div>
            <form>
                <div class="mb-3">
                    <label for="file" class="form-label">Select Video/Audio File (.mkv, .mp4, .wav, etc.)</label>
                    <input type="file" name="file" id="file" class="form-control" required>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">Upload & Transcribe</button>
                </div>
            </form>
        </div>

        <div class="card p-4">
            <h4>Recent Uploads</h4>
            <div class="table-responsive">
               
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
